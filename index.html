<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Preparador PDF → PDF_TEXTO</title>

<style>
  :root{
    --bg:#0f1115;
    --panel:#171a21;
    --panel2:#1f2430;
    --text:#f3f5f7;
    --muted:#aab2bf;
    --accent:#4f8cff;
    --border:#2b3240;
    --ok:#2ecc71;
  }

  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    background:var(--bg);
    color:var(--text);
  }

  .wrap{
    max-width:1100px;
    margin:24px auto;
    padding:0 16px 40px;
  }

  h1{
    margin:0 0 8px;
    font-size:32px;
  }

  .muted{
    color:var(--muted);
    margin-bottom:18px;
  }

  .panel{
    background:var(--panel);
    border:1px solid var(--border);
    border-radius:16px;
    padding:16px;
    margin-bottom:16px;
  }

  .row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
  }

  .btn{
    appearance:none;
    border:none;
    background:var(--accent);
    color:#fff;
    font-weight:800;
    padding:10px 14px;
    border-radius:12px;
    cursor:pointer;
  }

  .btn.sec{
    background:var(--panel2);
    border:1px solid var(--border);
  }

  .btn:disabled{
    opacity:.55;
    cursor:not-allowed;
  }

  input[type="file"]{
    display:block;
    width:100%;
    padding:12px;
    border-radius:12px;
    border:1px solid var(--border);
    background:var(--panel2);
    color:var(--text);
  }

  label.chk{
    display:flex;
    align-items:center;
    gap:8px;
    color:var(--muted);
    font-size:14px;
  }

  textarea{
    width:100%;
    min-height:220px;
    resize:vertical;
    border:1px solid var(--border);
    border-radius:14px;
    padding:14px;
    background:#0c0f14;
    color:var(--text);
    font:14px/1.55 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
  }

  .out{
    min-height:280px;
  }

  .tag{
    font-size:12px;
    font-weight:800;
    color:var(--muted);
    text-transform:uppercase;
    letter-spacing:.08em;
    margin-bottom:8px;
  }

  .status{
    font-size:14px;
    color:var(--muted);
    margin-top:8px;
  }

  .ok{
    color:var(--ok);
    font-weight:800;
  }

  .grid{
    display:grid;
    grid-template-columns:1fr;
    gap:16px;
  }

  @media (min-width: 980px){
    .grid{
      grid-template-columns:1fr 1fr;
    }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>Preparador PDF → <code>PDF_TEXTO</code></h1>
  <div class="muted">Subes el PDF, limpia el texto y te devuelve un bloque listo para copiar y pegar en tu HTML principal.</div>

  <div class="panel">
    <div class="row" style="margin-bottom:12px;">
      <input type="file" id="pdfFile" accept="application/pdf">
    </div>

    <div class="row" style="margin-bottom:12px;">
      <label class="chk">
        <input type="checkbox" id="chkUnirCortes" checked>
        Unir líneas cortadas por maquetación
      </label>

      <label class="chk">
        <input type="checkbox" id="chkSepararParrafos" checked>
        Reconstruir párrafos automáticamente
      </label>

      <label class="chk">
        <input type="checkbox" id="chkQuitarGuiones" checked>
        Arreglar palabras partidas por guion final de línea
      </label>
    </div>

    <div class="row">
      <button class="btn" id="btnProcesar">Procesar PDF</button>
      <button class="btn sec" id="btnGenerar">Generar bloque JS</button>
      <button class="btn sec" id="btnCopiar">Copiar resultado</button>
      <button class="btn sec" id="btnLimpiar">Limpiar</button>
    </div>

    <div id="status" class="status">Esperando PDF…</div>
  </div>

  <div class="grid">
    <div class="panel">
      <div class="tag">Texto limpio</div>
      <textarea id="txtLimpio" placeholder="Aquí aparecerá el texto limpio..."></textarea>
    </div>

    <div class="panel">
      <div class="tag">Bloque listo para pegar en tu código</div>
      <textarea id="txtSalida" class="out" placeholder="Aquí aparecerá:
const PDF_TEXTO = `...`.trim();"></textarea>
    </div>
  </div>
</div>

<!-- PDF.js -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/4.5.136/pdf.min.js"></script>

<script>
const pdfFile = document.getElementById("pdfFile");
const btnProcesar = document.getElementById("btnProcesar");
const btnGenerar = document.getElementById("btnGenerar");
const btnCopiar = document.getElementById("btnCopiar");
const btnLimpiar = document.getElementById("btnLimpiar");
const txtLimpio = document.getElementById("txtLimpio");
const txtSalida = document.getElementById("txtSalida");
const statusBox = document.getElementById("status");

const chkUnirCortes = document.getElementById("chkUnirCortes");
const chkSepararParrafos = document.getElementById("chkSepararParrafos");
const chkQuitarGuiones = document.getElementById("chkQuitarGuiones");

function setStatus(msg, ok=false){
  statusBox.innerHTML = ok ? `<span class="ok">${msg}</span>` : msg;
}

function escapeTemplateLiteral(str){
  return String(str)
    .replace(/\\/g, "\\\\")
    .replace(/`/g, "\\`")
    .replace(/\$\{/g, "\\${");
}

function normalizarEspacios(texto){
  return String(texto)
    .replace(/\r/g, "")
    .replace(/\u00A0/g, " ")
    .replace(/[ \t]+/g, " ")
    .replace(/[ \t]+\n/g, "\n")
    .replace(/\n{3,}/g, "\n\n")
    .trim();
}

function limpiarTextoPDF(texto){
  let t = normalizarEspacios(texto);

  if(chkQuitarGuiones.checked){
    // Une palabras partidas por guion al final de línea: admi-\nnistración -> administración
    t = t.replace(/([A-Za-zÁÉÍÓÚáéíóúÑñ])-\n([A-Za-zÁÉÍÓÚáéíóúÑñ])/g, "$1$2");
  }

  const lineas = t.split("\n").map(l => l.trim()).filter(Boolean);
  let reconstruido = [];
  let actual = "";

  const esTitulo = s => /^\d+(?:\.\d+)*\.\s+/.test(s);
  const empiezaMayus = s => /^[A-ZÁÉÍÓÚÑ]/.test(s);
  const terminaFuerte = s => /[.!?]$/.test(s);
  const terminaSuave = s => /[,;:]$/.test(s);

  for(const linea of lineas){
    if(esTitulo(linea)){
      if(actual.trim()) reconstruido.push(actual.trim());
      reconstruido.push(linea);
      actual = "";
      continue;
    }

    if(!chkUnirCortes.checked){
      if(actual.trim()) reconstruido.push(actual.trim());
      actual = linea;
      continue;
    }

    if(!actual){
      actual = linea;
      continue;
    }

    if(chkSepararParrafos.checked){
      if(terminaFuerte(actual) && empiezaMayus(linea)){
        reconstruido.push(actual.trim());
        actual = linea;
        continue;
      }

      if(terminaSuave(actual)){
        actual += " " + linea;
        continue;
      }
    }

    actual += " " + linea;
  }

  if(actual.trim()) reconstruido.push(actual.trim());

  // Compacta sin romper títulos
  const salida = [];
  for(let i = 0; i < reconstruido.length; i++){
    const item = reconstruido[i];

    if(/^\d+(?:\.\d+)*\.\s+/.test(item)){
      if(salida.length && salida[salida.length - 1] !== "") salida.push("");
      salida.push(item);
      continue;
    }

    salida.push(item);
  }

  return salida.join("\n\n").replace(/\n{3,}/g, "\n\n").trim();
}

async function extraerTextoDePDF(file){
  const buffer = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: buffer }).promise;

  let textoTotal = "";

  for(let i = 1; i <= pdf.numPages; i++){
    const page = await pdf.getPage(i);
    const content = await page.getTextContent();

    let ultimaY = null;
    let linea = "";
    const lineas = [];

    for(const item of content.items){
      const str = item.str || "";
      const y = item.transform ? item.transform[5] : null;

      if(ultimaY === null){
        linea = str;
        ultimaY = y;
        continue;
      }

      // Si cambia la coordenada Y, consideramos nueva línea
      if(Math.abs(y - ultimaY) > 2){
        lineas.push(linea);
        linea = str;
        ultimaY = y;
      } else {
        linea += (linea ? " " : "") + str;
      }
    }

    if(linea) lineas.push(linea);

    textoTotal += lineas.join("\n") + "\n\n";
  }

  return textoTotal.trim();
}

btnProcesar.addEventListener("click", async () => {
  try{
    const file = pdfFile.files[0];
    if(!file){
      setStatus("Selecciona primero un PDF.");
      return;
    }

    setStatus("Procesando PDF...");
    const bruto = await extraerTextoDePDF(file);
    const limpio = limpiarTextoPDF(bruto);

    txtLimpio.value = limpio;
    setStatus("PDF procesado correctamente.", true);
  }catch(err){
    console.error(err);
    setStatus("Error al procesar el PDF: " + (err.message || String(err)));
  }
});

btnGenerar.addEventListener("click", () => {
  const limpio = txtLimpio.value.trim();
  if(!limpio){
    setStatus("No hay texto limpio para generar.");
    return;
  }

  const bloque = "const PDF_TEXTO = `\n" + escapeTemplateLiteral(limpio) + "\n`.trim();";
  txtSalida.value = bloque;
  setStatus("Bloque JS generado.", true);
});

btnCopiar.addEventListener("click", async () => {
  try{
    const valor = txtSalida.value.trim() || txtLimpio.value.trim();
    if(!valor){
      setStatus("No hay nada para copiar.");
      return;
    }
    await navigator.clipboard.writeText(valor);
    setStatus("Copiado al portapapeles.", true);
  }catch{
    setStatus("No se pudo copiar automáticamente. Copia manual.");
  }
});

btnLimpiar.addEventListener("click", () => {
  pdfFile.value = "";
  txtLimpio.value = "";
  txtSalida.value = "";
  setStatus("Limpio.");
});
</script>
</body>
</html>
